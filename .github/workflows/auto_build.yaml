name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build
        run: uv run build.py

      - name: Get version and date
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          DATE=$(date +%Y%m%d)
          SHORT_SHA=${GITHUB_SHA::7}
          TAG="v${VERSION}-${DATE}.${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          # 获取上一个 tag，如果没有则取所有 commit
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          # 写入多行输出
          {
            echo "body<<EOF"
            echo "## 更新内容"
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Package artifact
        shell: pwsh
        run: Compress-Archive -Path "dist/fangclass_check_web/*" -DestinationPath "fangclass_check_web-${{ steps.version.outputs.tag }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: fangclass_check_web-${{ steps.version.outputs.tag }}.zip
          body: ${{ steps.notes.outputs.body }}
