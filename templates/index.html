<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研讨厅 · 提问记录查询</title>
    <link rel="icon" href="/static/icon/fanclass_256x256.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        .step-card { transition: all 0.3s ease; }
        .step-card.active { transform: scale(1.0); opacity: 1; }
        .step-card.inactive { transform: scale(0.98); opacity: 0.5; pointer-events: none; }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-border { 0%, 100% { border-color: #3b82f6; } 50% { border-color: #93c5fd; } }
        .pulse-border { animation: pulse-border 2s ease-in-out infinite; }
        .status-valid { color: #16a34a; background: #f0fdf4; }
        .status-invalid { color: #dc2626; background: #fef2f2; }
        .status-unknown { color: #d97706; background: #fffbeb; }
        .progress-bar { transition: width 0.5s ease; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 h-screen flex flex-col overflow-hidden">

    <!-- 顶部导航 -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 z-50 shrink-0">
        <div class="max-w-[1400px] mx-auto px-6 py-2.5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="/static/icon/fanclass_256x256.ico" alt="icon" class="w-8 h-8 rounded-lg">
                <h1 class="text-base font-semibold text-slate-800">研讨厅 · 提问记录查询</h1>
            </div>
            <div id="nav-user" class="hidden flex items-center gap-3">
                <span class="text-sm text-slate-500">当前用户：</span>
                <span id="nav-username" class="text-sm font-medium text-slate-700"></span>
                <button onclick="doLogout()" class="text-xs text-red-500 hover:text-red-700 border border-red-200 rounded-md px-2 py-1 hover:bg-red-50 transition">退出</button>
            </div>
        </div>
    </nav>

    <!-- 双栏主体 -->
    <div class="max-w-[1400px] mx-auto px-6 py-4 flex-1 min-h-0 flex gap-4 w-full">

        <!-- 左栏：登录 + 查询 -->
        <div class="w-[360px] shrink-0 flex flex-col gap-3">

            <!-- Step 1: 登录 -->
            <div id="step-login" class="step-card bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-4 py-2 border-b border-slate-100 flex items-center gap-2">
                    <div id="step1-badge" class="w-6 h-6 rounded-full bg-blue-500 text-white text-xs font-semibold flex items-center justify-center">1</div>
                    <h2 class="text-sm font-semibold text-slate-800">登录账号</h2>
                    <span id="step1-status" class="ml-auto text-xs text-slate-400"></span>
                </div>
                <div id="login-content" class="p-4">
                    <!-- 加载中 -->
                    <div id="login-loading" class="text-center py-4">
                        <div class="inline-block w-7 h-7 border-[3px] border-blue-200 border-t-blue-500 rounded-full animate-spin"></div>
                        <p class="mt-2 text-sm text-slate-500">正在检查登录状态...</p>
                    </div>
                    <!-- 未登录 -->
                    <div id="login-form" class="hidden">
                        <div id="login-buttons" class="flex flex-col items-center gap-3 py-1">
                            <p class="text-slate-500 text-sm">请选择登录方式</p>
                            <button onclick="startQrcodeLogin()" id="btn-qrcode"
                                class="px-5 py-2.5 bg-blue-500 text-white rounded-xl text-sm font-medium hover:bg-blue-600 transition flex items-center gap-2 shadow-lg shadow-blue-500/25">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                                扫码登录
                            </button>
                        </div>
                        <!-- 二维码显示区 -->
                        <div id="qrcode-area" class="hidden flex flex-col items-center gap-2 py-1 fade-in">
                            <div class="border-4 border-blue-100 rounded-2xl p-2 pulse-border">
                                <img id="qrcode-img" src="" alt="二维码" class="w-40 h-40 object-contain">
                            </div>
                            <p class="text-xs text-slate-500" id="qrcode-tip">请使用微信扫描上方二维码</p>
                            <div class="flex items-center gap-2 text-blue-500">
                                <div class="w-3.5 h-3.5 border-2 border-blue-300 border-t-blue-500 rounded-full animate-spin"></div>
                                <span class="text-xs">等待扫码中...</span>
                            </div>
                        </div>
                    </div>
                    <!-- 已有 cookie 可复用 -->
                    <div id="login-reuse" class="hidden flex flex-col items-center gap-2 py-1 fade-in">
                        <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
                            <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </div>
                        <p class="text-sm text-slate-700">检测到已保存的登录信息</p>
                        <p class="text-base font-semibold text-slate-800" id="reuse-username"></p>
                        <div class="flex gap-3">
                            <button onclick="reuseLogin()" class="px-5 py-2 bg-blue-500 text-white rounded-xl text-sm font-medium hover:bg-blue-600 transition shadow-lg shadow-blue-500/25">
                                继续使用
                            </button>
                            <button onclick="startQrcodeLogin()" class="px-5 py-2 bg-slate-100 text-slate-600 rounded-xl text-sm font-medium hover:bg-slate-200 transition">
                                重新登录
                            </button>
                        </div>
                    </div>
                    <!-- 登录成功 -->
                    <div id="login-success" class="hidden flex items-center gap-3 py-1 fade-in">
                        <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                            <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-slate-800">登录成功</p>
                            <p class="text-xs text-slate-500">欢迎，<span id="success-username" class="font-medium text-blue-600"></span></p>
                        </div>
                    </div>
                    <!-- 登录失败 -->
                    <div id="login-failed" class="hidden flex flex-col items-center gap-2 py-2 fade-in">
                        <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
                            <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </div>
                        <p class="text-red-600 text-sm font-medium" id="login-error-msg">登录失败</p>
                        <button onclick="startQrcodeLogin()" class="px-5 py-2 bg-blue-500 text-white rounded-xl text-sm font-medium hover:bg-blue-600 transition">重试</button>
                    </div>
                </div>
            </div>

            <!-- Step 2: 查询 -->
            <div id="step-query" class="step-card inactive bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-4 py-2 border-b border-slate-100 flex items-center gap-2">
                    <div id="step2-badge" class="w-6 h-6 rounded-full bg-slate-300 text-white text-xs font-semibold flex items-center justify-center">2</div>
                    <h2 class="text-sm font-semibold text-slate-800">选择学期 & 查询</h2>
                    <span id="step2-status" class="ml-auto text-xs text-slate-400"></span>
                </div>
                <div id="query-content" class="p-4">
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">选择学期</label>
                            <select id="semester-select" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                <option value="">加载中...</option>
                            </select>
                        </div>
                        <button onclick="startQuery()" id="btn-query"
                            class="w-full px-4 py-2.5 bg-blue-500 text-white rounded-xl text-sm font-medium hover:bg-blue-600 transition flex items-center justify-center gap-2 shadow-lg shadow-blue-500/25">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                            开始查询
                        </button>
                    </div>
                    <!-- 查询进度 -->
                    <div id="query-progress" class="hidden mt-3 fade-in">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs text-slate-600" id="query-progress-text">正在查询...</span>
                            <span class="text-xs text-blue-600 font-medium" id="query-progress-pct">0%</span>
                        </div>
                        <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div id="query-progress-bar" class="h-full bg-gradient-to-r from-blue-400 to-blue-600 rounded-full progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 报告预览（左栏底部） -->
            <div id="report-preview" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in flex-1 min-h-0 flex flex-col">
                <div class="px-4 py-2 border-b border-slate-100 flex items-center gap-2 shrink-0">
                    <div class="w-6 h-6 rounded-full bg-green-500 text-white text-xs font-semibold flex items-center justify-center">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    </div>
                    <h2 class="text-sm font-semibold text-slate-800">报告卡片</h2>
                    <a id="download-link" href="#" download class="ml-auto px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-xs font-medium hover:bg-blue-100 transition flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        下载
                    </a>
                </div>
                <div class="p-3 flex justify-center overflow-auto flex-1 min-h-0">
                    <img id="report-img" src="" alt="报告卡片" class="max-w-full max-h-full rounded-lg shadow-lg border border-slate-200 object-contain">
                </div>
            </div>
        </div>

        <!-- 右栏：结果 -->
        <div id="step-result" class="step-card inactive bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex-1 min-w-0 flex flex-col">
            <div class="px-4 py-2 border-b border-slate-100 flex items-center gap-2 shrink-0">
                <div id="step3-badge" class="w-6 h-6 rounded-full bg-slate-300 text-white text-xs font-semibold flex items-center justify-center">3</div>
                <h2 class="text-sm font-semibold text-slate-800">查询结果</h2>
                <!-- 操作按钮（移到标题栏） -->
                <div id="result-actions" class="hidden ml-auto flex items-center gap-2">
                    <button onclick="generateReport()" id="btn-report"
                        class="px-3 py-1.5 bg-green-500 text-white rounded-lg text-xs font-medium hover:bg-green-600 transition flex items-center gap-1.5 shadow-sm">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        生成报告
                    </button>
                    <button onclick="startQuery()" class="px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg text-xs font-medium hover:bg-slate-200 transition">
                        重新查询
                    </button>
                </div>
            </div>
            <div id="result-content" class="flex-1 min-h-0 flex flex-col p-4 overflow-auto">
                <!-- 统计卡片 -->
                <div id="stats-cards" class="grid grid-cols-5 gap-2 mb-3 shrink-0">
                </div>
                <!-- 数据表格 -->
                <div class="rounded-xl border border-slate-200 flex-1 min-h-0 overflow-auto">
                    <table class="w-full text-sm">
                        <thead class="sticky top-0 z-10">
                            <tr class="bg-slate-50 text-slate-500">
                                <th class="px-3 py-2 text-left text-xs font-medium">状态</th>
                                <th class="px-3 py-2 text-left text-xs font-medium">日期</th>
                                <th class="px-3 py-2 text-left text-xs font-medium">班级</th>
                                <th class="px-3 py-2 text-left text-xs font-medium">期数</th>
                                <th class="px-3 py-2 text-left text-xs font-medium">教室</th>
                                <th class="px-3 py-2 text-left text-xs font-medium">主讲人</th>
                            </tr>
                        </thead>
                        <tbody id="result-tbody">
                        </tbody>
                    </table>
                </div>
                <!-- 无数据提示 -->
                <div id="no-data" class="hidden flex-1 flex flex-col items-center justify-center">
                    <svg class="w-14 h-14 text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <p class="text-slate-400 text-sm">未查询到提问记录</p>
                </div>
            </div>
        </div>

    </div>

<script>
// ===== 状态管理 =====

let loginPollTimer = null;
let queryPollTimer = null;

// ===== 初始化 =====

async function init() {
    const res = await fetch('/api/login/status');
    const data = await res.json();

    hideAll('login');

    if (data.logged_in) {
        showLoginSuccess(data.name);
    } else if (data.has_cookies && data.name) {
        // 检测到 cookies.json 存在，显示复用选项
        document.getElementById('reuse-username').textContent = data.name;
        show('login-reuse');
    } else {
        show('login-form');
        show('login-buttons');
    }

    hide('login-loading');
}

// ===== 登录 =====

async function reuseLogin() {
    const res = await fetch('/api/login/reuse', { method: 'POST' });
    const data = await res.json();

    if (data.ok) {
        showLoginSuccess(data.name);
    } else {
        hideAll('login');
        show('login-form');
        show('login-buttons');
        alert(data.message || '复用登录失败');
    }
}

async function startQrcodeLogin() {
    hideAll('login');
    show('login-form');
    hide('login-buttons');
    show('qrcode-area');

    document.getElementById('qrcode-img').src = '';
    document.getElementById('qrcode-tip').textContent = '正在获取二维码...';

    await fetch('/api/login/qrcode', { method: 'POST' });

    // 开始轮询
    loginPollTimer = setInterval(pollLogin, 1500);
}

async function pollLogin() {
    const res = await fetch('/api/login/poll');
    const data = await res.json();

    if (data.qrcode_ready) {
        const img = document.getElementById('qrcode-img');
        if (!img.src.includes('/api/qrcode')) {
            img.src = '/api/qrcode?t=' + Date.now();
        }
        document.getElementById('qrcode-tip').textContent = '请使用微信扫描上方二维码';
    }

    if (data.status === 'success') {
        clearInterval(loginPollTimer);
        showLoginSuccess(data.name);
    } else if (data.status === 'failed') {
        clearInterval(loginPollTimer);
        hideAll('login');
        show('login-failed');
        document.getElementById('login-error-msg').textContent = data.message || '登录失败';
    }
}

function showLoginSuccess(name) {
    hideAll('login');
    show('login-success');
    document.getElementById('success-username').textContent = name;
    document.getElementById('step1-status').textContent = '已完成';
    document.getElementById('step1-badge').className = 'w-6 h-6 rounded-full bg-green-500 text-white text-xs font-semibold flex items-center justify-center';

    // 显示导航栏用户名
    document.getElementById('nav-user').classList.remove('hidden');
    document.getElementById('nav-user').classList.add('flex');
    document.getElementById('nav-username').textContent = name;

    // 激活 Step 2
    activateStep('step-query');
    loadSemesters();
}

async function doLogout() {
    if (!confirm('确定要退出登录吗？')) return;
    await fetch('/api/login/logout', { method: 'POST' });
    location.reload();
}

// ===== 学期加载 =====

async function loadSemesters() {
    const select = document.getElementById('semester-select');
    select.innerHTML = '<option value="">加载中...</option>';

    try {
        const res = await fetch('/api/semesters');
        const data = await res.json();

        select.innerHTML = '';
        if (data.semesters && data.semesters.length > 0) {
            data.semesters.forEach((s, i) => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                if (i === 0) opt.selected = true;
                select.appendChild(opt);
            });
        } else {
            select.innerHTML = '<option value="">暂无学期数据</option>';
        }
    } catch (e) {
        select.innerHTML = '<option value="">加载失败</option>';
    }
}

// ===== 查询 =====

async function startQuery() {
    const semester = document.getElementById('semester-select').value;
    if (!semester) {
        alert('请选择学期');
        return;
    }

    // 重置结果区
    deactivateStep('step-result');
    hide('report-preview');
    document.getElementById('step2-status').textContent = '';

    // 显示进度
    show('query-progress');
    document.getElementById('btn-query').disabled = true;
    document.getElementById('btn-query').classList.add('opacity-50');

    await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ semester: semester }),
    });

    queryPollTimer = setInterval(pollQuery, 1000);
}

async function pollQuery() {
    const res = await fetch('/api/query/status');
    const data = await res.json();

    const pct = data.total > 0 ? Math.round((data.progress / data.total) * 100) : 0;
    document.getElementById('query-progress-text').textContent = data.message || '查询中...';
    document.getElementById('query-progress-pct').textContent = pct + '%';
    document.getElementById('query-progress-bar').style.width = pct + '%';

    if (data.status === 'done') {
        clearInterval(queryPollTimer);
        document.getElementById('query-progress-bar').style.width = '100%';
        document.getElementById('query-progress-pct').textContent = '100%';
        document.getElementById('step2-status').textContent = '已完成';
        document.getElementById('step2-badge').className = 'w-6 h-6 rounded-full bg-green-500 text-white text-xs font-semibold flex items-center justify-center';

        document.getElementById('btn-query').disabled = false;
        document.getElementById('btn-query').classList.remove('opacity-50');

        await loadResult();
    } else if (data.status === 'error') {
        clearInterval(queryPollTimer);
        document.getElementById('query-progress-text').textContent = data.message || '查询出错';
        document.getElementById('btn-query').disabled = false;
        document.getElementById('btn-query').classList.remove('opacity-50');
    }
}

async function loadResult() {
    const res = await fetch('/api/query/result');
    const data = await res.json();

    activateStep('step-result');

    if (!data.results || data.results.length === 0) {
        show('no-data');
        hide('result-actions');
        document.getElementById('stats-cards').innerHTML = '';
        document.getElementById('result-tbody').innerHTML = '';
        return;
    }

    hide('no-data');
    show('result-actions');

    // 统计卡片
    const stats = [
        { label: '总提问', value: data.total, color: 'blue' },
        { label: '有效', value: data.valid, color: 'green' },
        { label: '无效', value: data.invalid, color: 'red' },
        { label: '未出结果', value: data.unknown, color: 'amber' },
        { label: '有效率', value: data.valid_rate, color: 'emerald', highlight: true },
    ];

    const cardsHtml = stats.map(s => `
        <div class="bg-${s.color}-50 rounded-lg p-2 text-center ${s.highlight ? 'ring-2 ring-' + s.color + '-200' : ''}">
            <p class="text-[10px] text-${s.color}-500 font-medium">${s.label}</p>
            <p class="text-lg font-bold text-${s.color}-600">${s.value}</p>
        </div>
    `).join('');
    document.getElementById('stats-cards').innerHTML = cardsHtml;

    // 数据表格
    const rowsHtml = data.results.map((r, i) => {
        let statusClass = 'status-unknown';
        if (r.status === '有效') statusClass = 'status-valid';
        else if (r.status === '无效') statusClass = 'status-invalid';

        return `
            <tr class="${i % 2 === 1 ? 'bg-slate-50/50' : ''} hover:bg-blue-50/50 transition">
                <td class="px-3 py-1.5"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${statusClass}">${r.status}</span></td>
                <td class="px-3 py-1.5 text-slate-600 text-xs">${r.date}</td>
                <td class="px-3 py-1.5 text-slate-600 text-xs">${r['class']}</td>
                <td class="px-3 py-1.5 text-slate-600 text-xs">${r.period}</td>
                <td class="px-3 py-1.5 text-slate-600 text-xs">${r.classroom}</td>
                <td class="px-3 py-1.5 text-slate-600 text-xs">${r.reporter}</td>
            </tr>
        `;
    }).join('');
    document.getElementById('result-tbody').innerHTML = rowsHtml;
}

// ===== 报告生成 =====

async function generateReport() {
    const btn = document.getElementById('btn-report');
    btn.disabled = true;
    btn.textContent = '生成中...';

    try {
        const res = await fetch('/api/report/generate', { method: 'POST' });
        const data = await res.json();

        if (data.ok) {
            const imgUrl = `/api/report/image/${data.filename}?t=${Date.now()}`;
            document.getElementById('report-img').src = imgUrl;
            document.getElementById('download-link').href = imgUrl;
            show('report-preview');
        } else {
            alert(data.error || '生成报告失败');
        }
    } catch (e) {
        alert('生成报告出错');
    }

    btn.disabled = false;
    btn.innerHTML = `
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        生成报告
    `;
}

// ===== UI 辅助 =====

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function hideAll(prefix) {
    const ids = {
        login: ['login-loading', 'login-form', 'login-reuse', 'login-success', 'login-failed', 'qrcode-area', 'login-buttons'],
    };
    (ids[prefix] || []).forEach(id => hide(id));
}

function activateStep(id) {
    const el = document.getElementById(id);
    el.classList.remove('inactive');
    el.classList.add('active');
    if (id === 'step-query') {
        document.getElementById('step2-badge').className = 'w-6 h-6 rounded-full bg-blue-500 text-white text-xs font-semibold flex items-center justify-center';
    }
    if (id === 'step-result') {
        document.getElementById('step3-badge').className = 'w-6 h-6 rounded-full bg-blue-500 text-white text-xs font-semibold flex items-center justify-center';
    }
}

function deactivateStep(id) {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.classList.add('inactive');
    if (id === 'step-result') {
        document.getElementById('step3-badge').className = 'w-6 h-6 rounded-full bg-slate-300 text-white text-xs font-semibold flex items-center justify-center';
    }
}

// 启动
init();
</script>
